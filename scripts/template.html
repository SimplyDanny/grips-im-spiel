<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grips im Spiel - Veranstaltungen</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Grips im Spiel</h1>
            <p class="subtitle">Veranstaltungen in der Stadtbibliothek Stuttgart</p>
            <div class="markdown-header-content">{description_html}</div>
        </header>

        <section class="events">
            <h2>Nächste Termine</h2>
            {events_html}
        </section>

        <div class="cta-section">
            <h2>Kalender abonnieren</h2>
            <p style="margin-top: 1rem; margin-bottom: 1.5rem;">
                Du kannst die Veranstaltungen direkt in deinem Kalender (Google Calendar, Outlook, Apple Calendar, etc.)
                importieren oder abonnieren.
            </p>
            <div class="cta-actions">
                <a href="stadtbibliothek.ics" class="cta" download="stadtbibliothek.ics">📥 Kalender herunterladen</a>
                <button type="button" class="cta cta-secondary" id="copy-calendar-url">🔗 Kalender-URL kopieren</button>
            </div>
            <p class="cta-feedback" id="copy-feedback" aria-live="polite"></p>
        </div>
    </div>
    <script src="copy_calendar.js" defer></script>
</body>

</html>
